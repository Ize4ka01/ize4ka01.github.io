<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор баллов | VuzStat</title>
    
    <style>
        :root {
            --bg-color: #f8faff; --card-bg: #ffffff; --text-color: #333333;
            --text-muted: #666666; --main-color: #1e56a0; --border-color: #edf2f7;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f8fafc;
            --text-muted: #94a3b8; --main-color: #38bdf8; --border-color: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 60px; }
        
        header { background-color: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; color: var(--main-color); text-decoration: none; }
        nav { display: flex; align-items: center; gap: 20px; }
        nav a { text-decoration: none; color: var(--text-muted); font-weight: bold; }
        nav a:hover { color: var(--main-color); }
        .theme-toggle { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; }

        .calculator-section { max-width: 800px; margin: 60px auto 40px; background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .calculator-section h1 { margin-bottom: 10px; font-size: 24px; color: var(--main-color); }
        .calculator-section p { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
        
        .inputs-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 13px; color: var(--text-muted); font-weight: bold; }
        .input-group input { width: 90px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); text-align: center; font-size: 18px; font-weight: bold; }
        
        .calc-btn { background-color: var(--main-color); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .calc-btn:hover { opacity: 0.9; }

        .popular-section { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .popular-section h2 { font-size: 22px; margin-bottom: 20px; text-align: center; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        /* Стили для карточек те же самые */
        .university-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); text-decoration: none; color: inherit; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .university-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .vuz-icon { font-size: 32px; background: var(--bg-color); padding: 10px; border-radius: 10px; }
        .university-card h3 { color: var(--main-color); font-size: 18px; }
        .city-badge { display: inline-block; background: var(--bg-color); color: var(--text-muted); font-size: 12px; padding: 4px 8px; border-radius: 4px; margin-top: 5px; }
        .vuz-info-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 15px; }
        .card-scores { display: flex; gap: 10px; font-size: 13px; font-weight: bold; }
        .score-tag { padding: 5px 10px; border-radius: 6px; }
        .sc-budget { background: #e3f9e5; color: #1f7a26; }
        .sc-comm { background: #fff3cd; color: #856404; }

        footer { margin-top: 80px; border-top: 1px solid var(--border-color); background: var(--card-bg); padding: 30px 5%; text-align: center; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">🎓 VuzStat</a>
        <nav>
            <a href="index.html">Главная</a>
            <a href="calc.html" style="color: var(--main-color);">Калькулятор баллов</a>
            <button class="theme-toggle" id="theme-btn">🌙 Темная тема</button>
        </nav>
    </header>

    <section class="calculator-section">
        <h1>Калькулятор шансов поступления</h1>
        <p>Введите ваши ожидаемые или полученные баллы ЕГЭ, и мы подберем вузы, в которые вы проходите.</p>
        <div class="inputs-grid">
            <div class="input-group">
                <label>Математика</label>
                <input type="number" id="math-input" placeholder="0" min="0" max="100">
            </div>
            <div class="input-group">
                <label>Русский язык</label>
                <input type="number" id="rus-input" placeholder="0" min="0" max="100">
            </div>
            <div class="input-group">
                <label>Предмет по выбору</label>
                <input type="number" id="third-input" placeholder="0" min="0" max="100">
            </div>
        </div>
        <button class="calc-btn" id="calc-button">Подобрать вузы</button>
    </section>

    <section class="popular-section">
        <h2 id="results-title" style="display: none;">Подходящие варианты:</h2>
        <div class="cards-grid" id="vuz-container">
            <p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Здесь появятся вузы после нажатия кнопки "Подобрать".</p>
        </div>
    </section>

    <footer>
        <p>© 2026 VuzStat. Все права защищены.</p>
    </footer>

    <script>
        const universities = [
            { name: "МГУ им. М.В. Ломоносова", city: "москва", link: "mgu.html", icon: "🏛️", desc: "Главный вуз страны. Высокие проходные баллы и собственный экзамен.", minBudget: 350, minComm: 240 },
            { name: "СПбГУ", city: "санкт-петербург", link: "spbgu.html", icon: "⚓", desc: "Один из старейших вузов. Программы международного уровня.", minBudget: 298, minComm: 210 }
        ];

        function displayVuz(list) {
            const container = document.getElementById('vuz-container');
            const title = document.getElementById('results-title');
            
            title.style.display = 'block';
            container.innerHTML = "";
            
            if (list.length === 0) {
                container.innerHTML = "<p style='color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 20px;'>К сожалению, с такими баллами вариантов в базе не найдено.</p>";
                return;
            }
            
            list.forEach(vuz => {
                container.innerHTML += 
                    <a href="${vuz.link}" class="university-card">
                        <div class="card-header">
                            <div class="vuz-icon">${vuz.icon}</div>
                            <div><h3>${vuz.name}</h3><span class="city-badge">${vuz.city.toUpperCase()}</span></div>
                        </div>
                        <p class="vuz-info-text">${vuz.desc}</p>
                        <div class="card-scores">
                            <span class="score-tag sc-budget">Бюджет от: ${vuz.minBudget}</span>
                            <span class="score-tag sc-comm">Платное от: ${vuz.minComm}</span>
                        </div>
                    </a>
                ;
            });
        }
