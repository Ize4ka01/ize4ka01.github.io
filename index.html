<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VuzStat — Проходные баллы</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f8faff; color: #333; }
        
        header { background-color: #ffffff; padding: 20px 5%; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: #1e56a0; }
        nav a { margin-left: 20px; text-decoration: none; color: #555; }

        .search-section { max-width: 800px; margin: 60px auto; text-align: center; padding: 0 20px; }
        .search-box { position: relative; margin-top: 20px; }
        .search-box input { width: 100%; padding: 20px; border-radius: 50px; border: 1px solid #ddd; font-size: 18px; outline: none; }
        .search-btn { position: absolute; right: 10px; top: 10px; background-color: #1e56a0; color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; }

        .popular-section { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .university-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: inherit; display: block; }
        .university-card h3 { color: #1e56a0; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">🎓 UniScore</div>
        <nav>
            <a href="#">Главная</a>
            <a href="#">Вузы</a>
        </nav>
    </header>

    <section class="search-section">
        <h2>Проходные баллы вузов 2026</h2>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Например: МГУ">
            <button class="search-btn" id="search-button">Найти</button>
        </div>
    </section>

    <section class="popular-section">
        <h2>Популярные запросы</h2>
        <div class="cards-grid">
            <a href="mgu.html" class="university-card">
                <h3>МГУ им. М.В. Ломоносова</h3>
                <p>Проходные баллы, бюджет и коммерция.</p>
            </a>
            <a href="spbgu.html" class="university-card">
                <h3>СПбГУ</h3>
                <p>Информация о приеме и проходных баллах.</p>
            </a>
        </div>
    </section>

    <script>
        function performSearch() {
            let query = document.getElementById('search-input').value.toLowerCase().trim();
            const db = { 
    "мгу": "mgu.html", 
    "спбгу": "spbgu.html" 
};
            
            if (db[query]) {
                window.location.href = db[query];
            } else {
                alert("Введи: МГУ или СПбГУ");
            }
        }
        document.getElementById('search-button').addEventListener('click', performSearch);
    </script>

</body>
</html>
